name: Update cache-bust version

on:
  push:
    branches: [main]
    paths:
      - styles.css
      - script.js

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject short SHA into index.html
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|styles\.css?v=[^\"]*|styles.css?v=${SHA}|g" index.html
          sed -i "s|script\.js?v=[^\"]*|script.js?v=${SHA}|g" index.html

      - name: Commit if index.html changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: cache-bust v$(git rev-parse --short HEAD) [skip ci]"
          git push
